include: package:flutter_lints/flutter.yaml

rules:
  require_trailing_commas: true

formatter:
  trailing_commas: preserve

linter:
  rules:
    avoid_print: true
    prefer_single_quotes: true
    require_trailing_commas: true
    null_check_on_nullable_type_parameter: false

analyzer:
  exclude:
    - "assets/**"
    - "build/**"
    - lib/generated/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - .dart_tool/**
  errors:
    invalid_annotation_target: ignore
